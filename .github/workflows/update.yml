name: Update SoussMassaMonitor

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "run_pipeline.py"
      - "templates/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/update.yml"
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: souss-massa-monitor
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and classify news
        run: python run_pipeline.py

      - name: Save updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news.csv data/crawl_state.json data/run_status.json output/index.html
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update news dashboard"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
